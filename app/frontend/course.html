<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Email Draft - Email Drafter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="course-page">
    <div class="course-container">
        <header class="course-header">
            <a href="/" class="back-link">← Draft Another Email</a>
            <div class="logo">✉️ Email Drafter</div>
        </header>

        <div class="email-result-wrapper">
            <div class="email-result-card">
                <h1>Your Email Draft</h1>
                <pre id="email-content" class="email-content">Loading your email...</pre>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const emailData = localStorage.getItem('currentEmail');
            if (!emailData) {
                window.location.href = '/';
                return;
            }

            document.getElementById('email-content').textContent = emailData;
        });
    </script>
</body>
</html>
