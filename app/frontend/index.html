<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Drafter - Multi-Agent Email Writer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-page">
    <div class="container">
        <header>
            <div class="logo">✉️ Email Drafter</div>
        </header>

        <main class="hero-section">
            <h1>Draft better emails with a team of AI agents.</h1>
            <p class="subtitle">
                Enter your email request, and our AI agents will plan, review, and draft a polished email for you.
            </p>

            <form id="create-form" class="email-form">
                <div class="form-group">
                    <label for="recipient-input">Recipient Type</label>
                    <input type="text" id="recipient-input" placeholder="e.g. manager, client, recruiter" required>
                </div>

                <div class="form-group">
                    <label for="purpose-input">Purpose</label>
                    <input type="text" id="purpose-input" placeholder="e.g. request deadline extension" required>
                </div>

                <div class="form-group">
                    <label for="tone-input">Tone</label>
                    <input type="text" id="tone-input" placeholder="e.g. professional and polite" required>
                </div>

                <div class="form-group">
                    <label for="language-input">Language</label>
                    <input type="text" id="language-input" placeholder="e.g. Traditional Chinese" value="Traditional Chinese" required>
                </div>

                <div class="form-group">
                    <label for="keypoints-input">Key Points</label>
                    <textarea id="keypoints-input" rows="6" placeholder="- Testing environment issue&#10;- 80% completed&#10;- Can deliver by tomorrow 5 PM" required></textarea>
                </div>

                <button type="submit" id="create-button">
                    <span>Draft Email</span>
                </button>
            </form>

            <div id="progress-container" class="progress-container hidden">
                <div class="agent-status">
                    <div class="status-icon">
                        <div class="spinner"></div>
                    </div>
                    <div id="status-text" class="status-text">Initializing AI agents...</div>
                </div>
                <div class="progress-steps">
                    <div class="step" id="step-researcher">
                        <div class="step-icon">🧭</div>
                        <div class="step-label">Planning</div>
                    </div>
                    <div class="step" id="step-judge">
                        <div class="step-icon">🧐</div>
                        <div class="step-label">Reviewing</div>
                    </div>
                    <div class="step" id="step-builder">
                        <div class="step-icon">✍️</div>
                        <div class="step-label">Drafting</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
